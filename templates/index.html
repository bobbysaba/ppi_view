<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NSSL Lidar PPI Viewer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Catppuccin Mocha palette ──────────────────────────────────────────── */
    :root {
      --bg:      #1e1e2e;
      --surface: #181825;
      --border:  #313244;
      --muted:   #45475a;
      --text:    #cdd6f4;
      --subtext: #a6adc8;
      --blue:    #89b4fa;
      --green:   #a6e3a1;
      --red:     #f38ba8;
      --orange:  #fab387;
      --purple:  #cba6f7;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: ui-monospace, 'Cascadia Code', monospace;
      font-size: 13px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ────────────────────────────────────────────────────────────── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 7px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      gap: 8px;
    }

    h1 {
      font-size: 0.82rem;
      color: #cfe2ff;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    #status-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.72rem;
      color: var(--subtext);
      flex-wrap: wrap;
    }

    #conn-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--green);
      transition: background 0.3s;
      flex-shrink: 0;
    }
    #conn-dot.stale { background: var(--orange); }
    #conn-dot.off   { background: var(--red); }
    #last-update.stale { color: var(--orange); }

    /* ── Shared button style ───────────────────────────────────────────────── */
    .btn {
      background: var(--muted);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 3px 9px;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.72rem;
      transition: border-color 0.15s, color 0.15s;
      white-space: nowrap;
    }
    .btn:hover:not(:disabled) { border-color: var(--subtext); }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }

    #live-btn       { border-color: var(--green); color: var(--green); }
    #live-btn.off   { border-color: var(--border); color: var(--subtext); }

    #date-input {
      background: var(--muted);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 3px 6px;
      border-radius: 4px;
      font-family: inherit;
      font-size: 0.72rem;
      color-scheme: dark;
    }
    #date-input:disabled { opacity: 0.35; }

    /* ── Controls bar ──────────────────────────────────────────────────────── */
    #controls {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 5px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    #playback { display: flex; gap: 3px; flex-shrink: 0; }

    .pb-btn {
      background: var(--muted);
      color: var(--text);
      border: 1px solid var(--border);
      width: 30px; height: 26px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.85rem;
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.15s, color 0.15s;
      user-select: none;
    }
    .pb-btn:hover:not(:disabled) { border-color: var(--subtext); }
    .pb-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    #btn-play { min-width: 34px; }
    #btn-play.playing { border-color: var(--blue); color: var(--blue); }

    #scrubber-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 1px;
      min-width: 0;
    }

    #scrubber {
      width: 100%;
      accent-color: var(--blue);
      cursor: pointer;
      height: 16px;
    }

    #scrub-label {
      font-size: 0.62rem;
      color: var(--subtext);
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Main grid ─────────────────────────────────────────────────────────── */
    main {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: 1fr 1fr 178px;
      gap: 9px;
      padding: 9px;
      overflow: hidden;
    }

    /* ── PPI panel cards ───────────────────────────────────────────────────── */
    .ppi-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }

    .panel-hdr {
      padding: 5px 8px 4px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 3px;
      flex-shrink: 0;
    }

    .tabs { display: flex; gap: 3px; }

    .tab {
      background: none;
      border: 1px solid var(--border);
      color: var(--subtext);
      padding: 1px 9px;
      border-radius: 3px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.68rem;
      transition: border-color 0.12s, color 0.12s;
    }
    .tab:hover  { border-color: var(--subtext); color: var(--text); }
    .tab.active { border-color: var(--blue); color: var(--blue); }

    .cb-canvas {
      display: block;
      width: 100%;
      height: 12px;
      border-radius: 2px;
    }

    .cb-labels {
      display: flex;
      justify-content: space-between;
      font-size: 0.58rem;
      color: var(--subtext);
    }

    .ppi-wrap {
      flex: 1;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: var(--bg);
      touch-action: none;
    }

    .ppi-wrap canvas {
      cursor: grab;
    }

    .ppi-wrap canvas.dragging {
      cursor: grabbing;
    }

    /* ── Sidebar ───────────────────────────────────────────────────────────── */
    #sidebar {
      display: flex;
      flex-direction: column;
      gap: 8px;
      overflow-y: auto;
      min-height: 0;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px 10px;
      flex-shrink: 0;
    }

    .card-title {
      font-size: 0.60rem;
      color: var(--subtext);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 5px;
    }

    .cv-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 2px 0;
      font-size: 0.68rem;
      border-bottom: 1px solid var(--border);
    }
    .cv-row:last-child { border-bottom: none; }
    .cv-label { color: var(--subtext); }
    .cv-val   { font-weight: 600; }

    .tog-row {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.68rem;
      padding: 2px 0;
      cursor: pointer;
      color: var(--subtext);
      user-select: none;
    }
    .tog-row:hover { color: var(--text); }
    .tog-row input { accent-color: var(--blue); cursor: pointer; }

    #no-data-msg {
      display: none;
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: var(--subtext);
      font-size: 0.75rem;
      pointer-events: none;
    }
  </style>
</head>
<body>

<header>
  <h1>NSSL Lidar PPI Viewer</h1>
  <div id="status-bar">
    <span id="conn-dot"></span>
    <span id="last-update">--:--:-- UTC</span>
    <button id="live-btn" class="btn">Live</button>
    <input type="date" id="date-input" disabled>
    <span id="precompute-msg" style="display:none; font-size:0.72rem; color:var(--orange);">⏳ Computing circulation…</span>
  </div>
</header>

<div id="controls">
  <div id="playback">
    <button class="pb-btn" id="btn-first" title="First scan" disabled>⏮</button>
    <button class="pb-btn" id="btn-rew"   title="Previous scan" disabled>⏪</button>
    <button class="pb-btn" id="btn-play"  title="Play / Pause" disabled>▶</button>
    <button class="pb-btn" id="btn-ff"    title="Next scan" disabled>⏩</button>
    <button class="pb-btn" id="btn-last"  title="Last scan" disabled>⏭</button>
  </div>
  <div id="scrubber-wrap">
    <input type="range" id="scrubber" min="0" max="0" value="0" step="1" disabled>
    <div id="scrub-label">-- local / -- UTC  (0 / 0)</div>
  </div>
</div>

<main>

  <!-- Left panel -->
  <div class="ppi-card" id="left-card">
    <div class="panel-hdr">
      <div class="tabs" data-side="left">
        <button class="tab active" data-field="velocity">Velocity</button>
        <button class="tab"        data-field="vorticity">Vorticity</button>
        <button class="tab"        data-field="circulation">Circulation</button>
        <button class="tab"        data-field="backscatter">Backscatter</button>
      </div>
      <canvas class="cb-canvas" id="left-cb"></canvas>
      <div class="cb-labels" id="left-cb-labels">
        <span></span><span></span><span></span>
      </div>
    </div>
    <div class="ppi-wrap" id="left-wrap">
      <canvas id="left-canvas"></canvas>
    </div>
  </div>

  <!-- Right panel -->
  <div class="ppi-card" id="right-card">
    <div class="panel-hdr">
      <div class="tabs" data-side="right">
        <button class="tab"        data-field="velocity">Velocity</button>
        <button class="tab active" data-field="vorticity">Vorticity</button>
        <button class="tab"        data-field="circulation">Circulation</button>
        <button class="tab"        data-field="backscatter">Backscatter</button>
      </div>
      <canvas class="cb-canvas" id="right-cb"></canvas>
      <div class="cb-labels" id="right-cb-labels">
        <span></span><span></span><span></span>
      </div>
    </div>
    <div class="ppi-wrap" id="right-wrap">
      <canvas id="right-canvas"></canvas>
    </div>
  </div>

  <!-- Sidebar -->
  <div id="sidebar">
    <div class="card">
      <div class="card-title">Scan Info</div>
      <div class="cv-row"><span class="cv-label">Scan #</span>   <span class="cv-val" id="si-snum">--</span></div>
      <div class="cv-row"><span class="cv-label">Time UTC</span> <span class="cv-val" id="si-time">--</span></div>
      <div class="cv-row"><span class="cv-label">Elevation</span><span class="cv-val" id="si-el">--</span></div>
      <div class="cv-row"><span class="cv-label">Heading</span>  <span class="cv-val" id="si-hdg">--</span></div>
      <div class="cv-row"><span class="cv-label">Rays</span>     <span class="cv-val" id="si-rays">--</span></div>
      <div class="cv-row"><span class="cv-label">Az Range</span> <span class="cv-val" id="si-az">--</span></div>
    </div>
    <div class="card" id="cursor-card">
      <div class="card-title">Cursor</div>
      <div class="cv-row"><span class="cv-label">Range</span>  <span class="cv-val" id="cur-range">--</span></div>
      <div class="cv-row"><span class="cv-label">Bearing</span><span class="cv-val" id="cur-az">--</span></div>
      <div class="cv-row"><span class="cv-label" id="cur-left-lbl">Left</span> <span class="cv-val" id="cur-left-val">--</span></div>
      <div class="cv-row"><span class="cv-label" id="cur-right-lbl">Right</span><span class="cv-val" id="cur-right-val">--</span></div>
    </div>
    <div class="card">
      <div class="card-title">Display</div>
      <label class="tog-row"><input type="checkbox" id="tog-rings" checked> Range rings</label>
      <label class="tog-row"><input type="checkbox" id="tog-bh"    checked> Beam height</label>
      <label class="tog-row"><input type="checkbox" id="tog-snr"> SNR filter</label>
      <div id="snr-thresh-row" style="display:none; padding:3px 0; font-size:0.68rem; color:var(--subtext);">
        Threshold&nbsp;
        <input type="number" id="snr-thresh" value="1.003" step="0.001" min="1.0" max="1.1"
               style="width:58px; background:var(--muted); color:var(--text); border:1px solid var(--border);
                      border-radius:3px; padding:1px 4px; font-family:inherit; font-size:0.68rem;">
      </div>
    </div>
  </div>

</main>

<script>
'use strict';
const TEST_DATE = {{ test_date | tojson }}; // e.g. "20250605" or null

// ── Colormaps ─────────────────────────────────────────────────────────────────
// Each entry: [R, G, B]  — stops evenly distributed across the colormap range

const CM = {
  // Velocity: approaching (negative) = green, receding (positive) = brown
  velocity: [
    [  0,  64,   0],   // -20 m/s  very dark green
    [  0, 112,   0],   // -15
    [  0, 160,   0],   // -10
    [112, 224, 112],   //  -5
    [240, 242, 240],   //   0  near-white
    [208, 160, 112],   //  +5  tan
    [160,  96,  48],   // +10  brown
    [112,  48,  16],   // +15
    [ 64,  24,   8],   // +20  very dark brown
  ],
  // Vorticity: anticyclonic (negative) = blue, cyclonic (positive) = red
  vorticity: [
    [  0,   0, 200],   // -0.05 s⁻¹  dark blue
    [ 64, 128, 255],   // -0.025
    [180, 215, 255],   // -0.005
    [245, 245, 245],   //  0     white
    [255, 180, 150],   // +0.005
    [255,  40,   0],   // +0.025
    [192,   0,   0],   // +0.05  dark red
  ],
  circulation: [
    [  0,   0, 200],
    [ 64, 128, 255],
    [180, 215, 255],
    [245, 245, 245],
    [255, 180, 150],
    [255,  40,   0],
    [192,   0,   0],
  ],
  // Backscatter: sequential plasma-like
  backscatter: [
    [ 13,   8, 135],
    [ 84,   2, 163],
    [139,  10, 165],
    [185,  50, 137],
    [219,  92, 104],
    [244, 136,  73],
    [254, 188,  43],
    [239, 248,  33],
  ],
};

// [vmin, vmax, isLogScale, unitLabel, minLabel, maxLabel]
const FIELD_CFG = {
  velocity:    { min: -20,   max:  20,   log: false, unit: 'm/s',        minLbl: '-20',  maxLbl: '+20'  },
  vorticity:   { min: -0.05, max:  0.05, log: false, unit: 's⁻¹',       minLbl: '-0.05',maxLbl: '+0.05'},
  circulation: { min: -500,  max:  500,  log: false, unit: 'm²/s',      minLbl: '-500', maxLbl: '+500' },
  backscatter: { min:   -7,  max:  -3,   log: true,  unit: 'km⁻¹sr⁻¹',  minLbl: '1e-7', maxLbl: '1e-3' },
};

function lerp(a, b, t) { return a + (b - a) * t; }

function sampleCM(stops, t) {
  t = Math.max(0, Math.min(1, t));
  const pos = t * (stops.length - 1);
  const i   = Math.min(Math.floor(pos), stops.length - 2);
  const f   = pos - i;
  return [
    Math.round(lerp(stops[i][0], stops[i+1][0], f)),
    Math.round(lerp(stops[i][1], stops[i+1][1], f)),
    Math.round(lerp(stops[i][2], stops[i+1][2], f)),
  ];
}

// ── Application state ─────────────────────────────────────────────────────────
const S = {
  scans:      [],      // scan metadata list from /scans
  idx:        -1,      // current scan index into S.scans
  leftField:  'velocity',
  rightField: 'vorticity',
  cache:      {},      // snum → scan data
  isPlaying:  false,
  playTimer:  null,
  isLive:     true,
  viewDate:   null,    // null = today; 'YYYYMMDD' for historical
  sse:        null,
  // Per-scan rendering precomputation
  rawRayLUT:  null,    // Int16Array(3600): tenth-degree raw-az bucket → ray index
  rInfo:      null,    // {r0, dr, ng}
  heading:    0,
  renderR:    null,    // max range km — stored for cursor readout
  showRings:  true,
  showBH:     true,
  snrFilter:  false,
  snrThresh:  1.003,
  view: {
    zoom: 1,
    minZoom: 1,
    maxZoom: 12,
    panX: 0,
    panY: 0,
    pointerId: null,
    lastX: 0,
    lastY: 0,
    moved: false,
  },
};

function clamp(value, min, max) {
  return Math.max(min, Math.min(max, value));
}

function resetViewport(shouldRender = true) {
  S.view.zoom = 1;
  S.view.panX = 0;
  S.view.panY = 0;
  if (shouldRender) renderVisible();
}

function clampViewport() {
  if (S.renderR === null) return;
  const maxPan = S.renderR * (1 - 1 / S.view.zoom);
  S.view.panX = clamp(S.view.panX, -maxPan, maxPan);
  S.view.panY = clamp(S.view.panY, -maxPan, maxPan);
}

function cssBaseScale(width, height, maxRangeKm) {
  return Math.min(width, height) * 0.44 / maxRangeKm;
}

function worldFromScreen(x, y, width, height, maxRangeKm) {
  const baseScale = cssBaseScale(width, height, maxRangeKm);
  const cx = width / 2;
  const cy = height / 2;
  return {
    x: S.view.panX + (x - cx) / (baseScale * S.view.zoom),
    y: S.view.panY + (cy - y) / (baseScale * S.view.zoom),
  };
}

function setZoomAtPoint(nextZoom, x, y, width, height) {
  if (S.renderR === null) return;
  const zoom = clamp(nextZoom, S.view.minZoom, S.view.maxZoom);
  const world = worldFromScreen(x, y, width, height, S.renderR);
  const baseScale = cssBaseScale(width, height, S.renderR);
  const cx = width / 2;
  const cy = height / 2;

  S.view.zoom = zoom;
  S.view.panX = world.x - (x - cx) / (baseScale * zoom);
  S.view.panY = world.y - (cy - y) / (baseScale * zoom);
  clampViewport();
}

// ── Ray / range lookup tables ─────────────────────────────────────────────────
function buildRawRayLUT(rawAz) {
  // rawAz: sorted ascending, lidar frame (e.g. 240–300°), no wrapping.
  // Returns Int16Array(3600) mapping tenth-degree bucket → ray index, -1 = outside sector.
  const lut = new Int16Array(3600).fill(-1);
  const n   = rawAz.length;
  if (n < 2) return lut;

  for (let j = 0; j < n; j++) {
    const lo = j === 0     ? rawAz[0]   - (rawAz[1]   - rawAz[0])   / 2
                           : (rawAz[j-1] + rawAz[j])   / 2;
    const hi = j === n - 1 ? rawAz[n-1] + (rawAz[n-1] - rawAz[n-2]) / 2
                           : (rawAz[j]   + rawAz[j+1]) / 2;
    const k0 = Math.max(0,    Math.floor(lo * 10));
    const k1 = Math.min(3599, Math.floor(hi * 10));
    for (let k = k0; k <= k1; k++) lut[k] = j;
  }
  return lut;
}

function prepareScanCache(data) {
  S.rawRayLUT = buildRawRayLUT(data.azimuth);
  const r     = data.range_km;
  S.rInfo     = { r0: r[0], dr: r[1] - r[0], ng: r.length };
  S.heading   = data.heading;
}

// ── PPI Canvas rendering ──────────────────────────────────────────────────────
function renderPPI(canvas, data, field) {
  if (!canvas || !data || !S.rawRayLUT) return;
  const W = canvas.width, H = canvas.height;
  if (!W || !H) return;

  const ctx  = canvas.getContext('2d');
  const cx   = W / 2, cy = H / 2;
  const rArr = data.range_km;
  const R    = rArr[rArr.length - 1];
  const scale = cssBaseScale(W, H, R);   // px per km

  S.renderR = R;   // store for cursor readout
  clampViewport();

  const vals = data[field];
  const ints = (S.snrFilter && data.intensity) ? data.intensity : null;
  const snrT = S.snrThresh;
  const { r0, dr, ng } = S.rInfo;
  const lut  = S.rawRayLUT;
  const hdg  = S.heading;
  const zoom = S.view.zoom;
  const panX = S.view.panX;
  const panY = S.view.panY;
  const invScale = 1 / (scale * zoom);

  // Build 1024-entry colour LUT for this field
  const stops = CM[field];
  const NL    = 1024;
  const lutR  = new Uint8Array(NL), lutG = new Uint8Array(NL), lutB = new Uint8Array(NL);
  for (let i = 0; i < NL; i++) {
    const [r, g, b] = sampleCM(stops, i / (NL - 1));
    lutR[i] = r; lutG[i] = g; lutB[i] = b;
  }

  const cfg    = FIELD_CFG[field];
  const vmin   = cfg.min, vrange = cfg.max - cfg.min, isLog = cfg.log;

  // Fill image data
  const img = ctx.createImageData(W, H);
  const px  = img.data;

  // Background: #1e1e2e = (30, 30, 46)
  for (let k = 0; k < px.length; k += 4) {
    px[k] = 30; px[k+1] = 30; px[k+2] = 46; px[k+3] = 255;
  }

  const R2  = R * R;
  const r02 = r0 * r0;
  const P180 = Math.PI / 180;

  for (let row = 0; row < H; row++) {
    const dy_km = panY + (cy - row) * invScale;   // North = positive

    for (let col = 0; col < W; col++) {
      const dx_km = panX + (col - cx) * invScale; // East = positive

      const r2 = dx_km * dx_km + dy_km * dy_km;
      if (r2 > R2 || r2 < r02) continue;

      // Geographic azimuth [0, 360)
      let azGeo = Math.atan2(dx_km, dy_km) / P180;
      if (azGeo < 0) azGeo += 360;

      // Rotate back to lidar frame for LUT lookup
      const azRaw = ((azGeo - hdg) % 360 + 360) % 360;
      const rayJ  = lut[Math.floor(azRaw * 10) % 3600];
      if (rayJ < 0) continue;

      // Range gate (uniform grid → direct formula)
      const r_km  = Math.sqrt(r2);
      const gateI = Math.min(ng - 2, Math.max(0, Math.floor((r_km - r0) / dr)));

      // SNR mask
      if (ints) {
        const snr = ints[rayJ][gateI];
        if (snr === null || snr < snrT) continue;
      }

      const v = vals[rayJ][gateI];
      if (v === null || v === undefined) continue;

      // Normalise to [0, 1]
      let t;
      if (isLog) {
        const lv = v > 0 ? Math.log10(v) : vmin - 1;
        t = (lv - vmin) / vrange;
      } else {
        t = (v - vmin) / vrange;
      }

      const li  = Math.max(0, Math.min(NL - 1, Math.round(t * (NL - 1))));
      const pi  = (row * W + col) * 4;
      px[pi]    = lutR[li];
      px[pi+1]  = lutG[li];
      px[pi+2]  = lutB[li];
      // alpha already 255
    }
  }

  ctx.putImageData(img, 0, 0);

  // Overlays
  const viewCx = cx - panX * scale * zoom;
  const viewCy = cy + panY * scale * zoom;
  const viewScale = scale * zoom;
  if (S.showRings) drawRangeRings(ctx, viewCx, viewCy, viewScale, R);
  if (S.showBH && data.elevation !== undefined) drawBeamHeightRings(ctx, viewCx, viewCy, viewScale, data.elevation, R);
  drawNorthArrow(ctx, viewCx, viewCy, viewScale, R);
}

function drawRangeRings(ctx, cx, cy, scale, maxR) {
  ctx.save();
  ctx.strokeStyle = 'rgba(166,173,200,0.25)';
  ctx.lineWidth   = 1;
  ctx.setLineDash([3, 5]);
  ctx.font        = '10px ui-monospace, monospace';
  ctx.fillStyle   = 'rgba(166,173,200,0.65)';
  ctx.textAlign   = 'left';

  const step = maxR > 8 ? 2 : 1;
  for (let r = step; r <= maxR; r += step) {
    const px = r * scale;
    ctx.beginPath();
    ctx.arc(cx, cy, px, 0, 2 * Math.PI);
    ctx.stroke();
    ctx.fillText(`${r} km`, cx + 3, cy - px + 10);
  }
  ctx.setLineDash([]);
  ctx.restore();
}

function drawBeamHeightRings(ctx, cx, cy, scale, el_deg, maxR) {
  if (Math.abs(el_deg) < 0.05) return;  // near-zero elevation → rings outside range
  const el_rad  = el_deg * Math.PI / 180;
  const Re_eff  = 8495;                  // 4/3 × 6371 km (effective Earth radius)
  const heights = [0.1, 0.25, 0.5, 1.0, 2.0];

  ctx.save();
  ctx.strokeStyle = 'rgba(250,179,135,0.35)';
  ctx.lineWidth   = 1;
  ctx.setLineDash([2, 7]);
  ctx.font        = '9px ui-monospace, monospace';
  ctx.fillStyle   = 'rgba(250,179,135,0.65)';
  ctx.textAlign   = 'left';

  for (const h of heights) {
    // Solve r²/(2·Re_eff) + r·sin(el) − h = 0 for r
    const a    = 1 / (2 * Re_eff);
    const b    = Math.sin(el_rad);
    const disc = b * b + 4 * a * h;
    if (disc < 0) continue;
    const r_km = (-b + Math.sqrt(disc)) / (2 * a);
    if (r_km <= 0 || r_km > maxR) continue;

    const px = r_km * scale;
    ctx.beginPath();
    ctx.arc(cx, cy, px, 0, 2 * Math.PI);
    ctx.stroke();
    const lbl = h >= 1 ? `${h} km AGL` : `${Math.round(h*1000)} m AGL`;
    ctx.fillText(lbl, cx + 3, cy - px - 2);
  }
  ctx.setLineDash([]);
  ctx.restore();
}

function drawNorthArrow(ctx, cx, cy, scale, maxR) {
  const tip = cy - scale * maxR - 6;
  ctx.save();
  ctx.fillStyle   = 'rgba(205,214,244,0.85)';
  ctx.strokeStyle = 'rgba(205,214,244,0.85)';
  ctx.lineWidth   = 1.5;
  ctx.font        = 'bold 11px ui-monospace, monospace';
  ctx.textAlign   = 'center';
  // Arrow shaft
  ctx.beginPath();
  ctx.moveTo(cx, cy - scale * maxR + 2);
  ctx.lineTo(cx, tip + 8);
  ctx.stroke();
  // Arrowhead
  ctx.beginPath();
  ctx.moveTo(cx, tip);
  ctx.lineTo(cx - 4, tip + 8);
  ctx.lineTo(cx + 4, tip + 8);
  ctx.closePath();
  ctx.fill();
  // N label
  ctx.fillText('N', cx, tip - 2);
  ctx.restore();
}

// ── Colourbar ────────────────────────────────────────────────────────────────
function drawColorbar(canvasId, labelsId, field) {
  const canvas = document.getElementById(canvasId);
  const labels = document.getElementById(labelsId);
  if (!canvas) return;

  const W = canvas.offsetWidth || 200;
  canvas.width  = W;
  canvas.height = 12;

  const ctx  = canvas.getContext('2d');
  const grad = ctx.createLinearGradient(0, 0, W, 0);
  const stops = CM[field];
  stops.forEach((s, i) => {
    grad.addColorStop(i / (stops.length - 1), `rgb(${s[0]},${s[1]},${s[2]})`);
  });
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, 12);

  const cfg = FIELD_CFG[field];
  const [lo, mid, hi] = labels.children;
  lo.textContent  = cfg.minLbl;
  mid.textContent = cfg.unit;
  hi.textContent  = cfg.maxLbl;
}

// ── Cursor readout ────────────────────────────────────────────────────────────
function formatVal(field, v) {
  if (v === null || v === undefined) return '--';
  if (field === 'velocity')    return `${v.toFixed(2)} m/s`;
  if (field === 'vorticity')   return `${v.toFixed(4)} s⁻¹`;
  if (field === 'circulation') return `${v.toFixed(2)} m²/s`;
  if (field === 'backscatter') return v.toExponential(2) + ' km⁻¹sr⁻¹';
  return String(v);
}

function updateCursorLabels() {
  const fieldName = f => f.charAt(0).toUpperCase() + f.slice(1);
  document.getElementById('cur-left-lbl').textContent  = fieldName(S.leftField);
  document.getElementById('cur-right-lbl').textContent = fieldName(S.rightField);
}

function clearCursor() {
  ['cur-range','cur-az','cur-left-val','cur-right-val'].forEach(id => {
    document.getElementById(id).textContent = '--';
  });
}

function handleCursorMove(e) {
  if (!S.rawRayLUT || S.idx < 0 || S.renderR === null) return;

  const canvas   = e.currentTarget;
  const W_css    = canvas.offsetWidth;
  const H_css    = canvas.offsetHeight;
  const R        = S.renderR;
  const { x: dx_km, y: dy_km } = worldFromScreen(e.offsetX, e.offsetY, W_css, H_css, R);
  const r_km  = Math.sqrt(dx_km * dx_km + dy_km * dy_km);

  if (r_km > R || r_km < S.rInfo.r0) { clearCursor(); return; }

  let azGeo = Math.atan2(dx_km, dy_km) * 180 / Math.PI;
  if (azGeo < 0) azGeo += 360;

  const azRaw = ((azGeo - S.heading) % 360 + 360) % 360;
  const rayJ  = S.rawRayLUT[Math.floor(azRaw * 10) % 3600];
  if (rayJ < 0) { clearCursor(); return; }

  const { r0, dr, ng } = S.rInfo;
  const gateI = Math.min(ng - 2, Math.max(0, Math.floor((r_km - r0) / dr)));

  const data = S.cache[S.scans[S.idx].snum];
  if (!data) return;

  document.getElementById('cur-range').textContent    = `${r_km.toFixed(2)} km`;
  document.getElementById('cur-az').textContent       = `${azGeo.toFixed(1)}°`;
  document.getElementById('cur-left-val').textContent  = formatVal(S.leftField,  data[S.leftField][rayJ][gateI]);
  document.getElementById('cur-right-val').textContent = formatVal(S.rightField, data[S.rightField][rayJ][gateI]);
}

// ── Precompute polling ────────────────────────────────────────────────────────
let _precomputePollTimer = null;

function _setPrecomputeMsg(visible) {
  document.getElementById('precompute-msg').style.display = visible ? '' : 'none';
}

async function _startPrecompute(dateStr, onDone) {
  await fetch('/precompute', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ date: dateStr }),
  });
  _setPrecomputeMsg(true);
  clearInterval(_precomputePollTimer);
  _precomputePollTimer = setInterval(async () => {
    try {
      const r    = await fetch('/precompute_status');
      const body = await r.json();
      if (!body.computing) {
        clearInterval(_precomputePollTimer);
        _precomputePollTimer = null;
        _setPrecomputeMsg(false);
        if (onDone) onDone();
      }
    } catch (_) {}
  }, 1000);
}

// ── Data loading ──────────────────────────────────────────────────────────────
async function fetchScans() {
  const qs   = S.viewDate ? `?date=${S.viewDate}` : '';
  const resp = await fetch(`/scans${qs}`);
  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
  const body = await resp.json();
  S.scans = body.scans || [];
}

async function fetchScanData(snum) {
  if (S.cache[snum]) return S.cache[snum];
  const qs   = S.viewDate ? `?date=${S.viewDate}` : '';
  const resp = await fetch(`/scan/${snum}${qs}`);
  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
  const data = await resp.json();
  S.cache[snum] = data;
  return data;
}

function currentScanData() {
  if (S.idx < 0 || S.idx >= S.scans.length) return null;
  return S.cache[S.scans[S.idx].snum] || null;
}

function renderLoadedData(data) {
  if (!data || S.idx < 0 || S.idx >= S.scans.length) return;
  prepareScanCache(data);

  const lc = document.getElementById('left-canvas');
  const rc = document.getElementById('right-canvas');
  resizeCanvasToWrap(lc, 'left-wrap');
  resizeCanvasToWrap(rc, 'right-wrap');

  renderPPI(lc, data, S.leftField);
  renderPPI(rc, data, S.rightField);
  drawColorbar('left-cb',  'left-cb-labels',  S.leftField);
  drawColorbar('right-cb', 'right-cb-labels', S.rightField);
  updateScanInfo(S.scans[S.idx], data);
  updateLastUpdate(data.timestamp);
}

function renderVisible() {
  const data = currentScanData();
  if (data) renderLoadedData(data);
}

// ── Render both panels ────────────────────────────────────────────────────────
async function renderCurrent() {
  if (S.idx < 0 || S.idx >= S.scans.length) return;
  const snum = S.scans[S.idx].snum;

  let data;
  try {
    data = await fetchScanData(snum);
  } catch (e) {
    console.error('fetchScanData error', e);
    return;
  }
  renderLoadedData(data);
}

function resizeCanvasToWrap(canvas, wrapId) {
  const wrap = document.getElementById(wrapId);
  if (!wrap) return;
  const dpr  = window.devicePixelRatio || 1;
  const size = Math.min(wrap.clientWidth - 2, wrap.clientHeight - 2);
  if (size > 0) {
    canvas.width        = Math.round(size * dpr);
    canvas.height       = Math.round(size * dpr);
    canvas.style.width  = `${size}px`;
    canvas.style.height = `${size}px`;
  }
}

// ── Scan navigation ───────────────────────────────────────────────────────────
function setIdx(i) {
  S.idx = Math.max(0, Math.min(S.scans.length - 1, i));
  updateScrubber();
  renderCurrent();
}

function goFirst()  { pause(); setIdx(0); }
function goLast()   { pause(); setIdx(S.scans.length - 1); }
function stepBack() { pause(); setIdx(S.idx - 1); }
function stepFwd()  { pause(); setIdx(S.idx + 1); }

function play() {
  if (S.isPlaying || S.scans.length === 0) return;
  S.isPlaying = true;
  document.getElementById('btn-play').textContent = '⏸';
  document.getElementById('btn-play').classList.add('playing');
  S.playTimer = setInterval(() => {
    if (S.idx < S.scans.length - 1) {
      S.idx++;
      updateScrubber();
      renderCurrent();
    } else {
      pause();
    }
  }, 800);
}

function pause() {
  if (!S.isPlaying) return;
  S.isPlaying = false;
  clearInterval(S.playTimer);
  S.playTimer = null;
  document.getElementById('btn-play').textContent = '▶';
  document.getElementById('btn-play').classList.remove('playing');
}

function togglePlay() {
  S.isPlaying ? pause() : play();
}

// ── UI updates ────────────────────────────────────────────────────────────────
function updateScrubber() {
  const el = document.getElementById('scrubber');
  const lbl = document.getElementById('scrub-label');
  const n  = S.scans.length;
  el.max   = Math.max(0, n - 1);
  el.value = S.idx;

  if (n === 0 || S.idx < 0) {
    lbl.textContent = '-- local / -- UTC  (0 / 0)';
    return;
  }
  const scan = S.scans[S.idx];
  const ts   = scan.timestamp;
  const dt   = new Date(ts * 1000);
  const utc  = dt.toISOString().slice(11, 19);
  const local = scan.local_label || scan.local_time || '--';
  lbl.textContent = `${local} / ${utc} UTC  (${S.idx + 1} / ${n})`;
}

function updateScanInfo(meta, data) {
  if (!meta) return;
  document.getElementById('si-snum').textContent = meta.snum;
  const dt = new Date(meta.timestamp * 1000);
  document.getElementById('si-time').textContent = dt.toISOString().slice(11, 19);
  document.getElementById('si-el').textContent   = `${meta.elevation}°`;
  document.getElementById('si-hdg').textContent  = `${meta.heading}°`;
  document.getElementById('si-rays').textContent = meta.n_rays;
  document.getElementById('si-az').textContent   = `${meta.az_min}° – ${meta.az_max}°`;
}

function updateLastUpdate(ts) {
  const dt  = new Date(ts * 1000);
  const hms = dt.toISOString().slice(11, 19);
  const el  = document.getElementById('last-update');
  el.textContent = `${hms} UTC`;
  el.classList.remove('stale');
}

function setConnState(state) {
  // state: 'live' | 'stale' | 'off'
  const dot = document.getElementById('conn-dot');
  dot.className = state === 'live' ? '' : state;
}

function enableControls(on) {
  ['btn-first','btn-rew','btn-play','btn-ff','btn-last','scrubber'].forEach(id => {
    document.getElementById(id).disabled = !on;
  });
}

// ── SSE / realtime ────────────────────────────────────────────────────────────
function connectSSE() {
  if (S.sse) { S.sse.close(); S.sse = null; }
  S.sse = new EventSource('/stream');

  S.sse.onopen = () => setConnState('live');

  S.sse.onmessage = async e => {
    setConnState('live');
    if (!S.isLive) return;
    try {
      await fetchScans();
      updateScrubber();
      enableControls(S.scans.length > 0);
      if (!S.isPlaying) {
        S.idx = S.scans.length - 1;
        updateScrubber();
        renderCurrent();
      }
    } catch (err) { console.error('SSE update error', err); }
  };

  S.sse.onerror = () => setConnState('off');
}

// ── Date / Live toggle ────────────────────────────────────────────────────────
async function toggleLive(wantLive) {
  S.isLive = wantLive;
  const btn   = document.getElementById('live-btn');
  const dateI = document.getElementById('date-input');

  if (wantLive) {
    btn.classList.remove('off');
    dateI.disabled = true;
    S.viewDate     = null;
    S.cache        = {};
    pause();
    try {
      await fetchScans();
      enableControls(S.scans.length > 0);
      updateScrubber();
      S.idx = S.scans.length - 1;
      updateScrubber();
      renderCurrent();
    } catch(e) { console.error(e); }
    connectSSE();
  } else {
    btn.classList.add('off');
    dateI.disabled = false;
    if (S.sse) { S.sse.close(); S.sse = null; }
    setConnState('off');
  }
}

async function handleDateChange() {
  const val = document.getElementById('date-input').value;  // 'YYYY-MM-DD'
  if (!val) return;
  const dateStr = val.replace(/-/g, '');  // 'YYYYMMDD'
  pause();
  await _startPrecompute(dateStr, async () => {
    S.viewDate = dateStr;
    S.cache    = {};
    try {
      await fetchScans();
      enableControls(S.scans.length > 0);
      S.idx = S.scans.length > 0 ? 0 : -1;
      updateScrubber();
      if (S.idx >= 0) renderCurrent();
    } catch(e) { console.error(e); }
  });
}

// ── Field tab switching ───────────────────────────────────────────────────────
function switchField(side, field) {
  if (side === 'left')  S.leftField  = field;
  else                  S.rightField = field;

  // Update tab styles
  document.querySelectorAll(`.tabs[data-side="${side}"] .tab`).forEach(btn => {
    btn.classList.toggle('active', btn.dataset.field === field);
  });

  updateCursorLabels();

  // Re-render just the affected side
  const cid  = `${side}-canvas`;
  const cbid = `${side}-cb`;
  const lblid= `${side}-cb-labels`;
  const canvas = document.getElementById(cid);
  const idx = S.idx;
  if (idx < 0 || idx >= S.scans.length) return;
  const data = S.cache[S.scans[idx].snum];
  if (!data) return;
  renderPPI(canvas, data, field);
  drawColorbar(cbid, lblid, field);
}

function handleViewportWheel(e) {
  if (S.renderR === null) return;
  e.preventDefault();

  const canvas = e.currentTarget;
  const width = canvas.offsetWidth;
  const height = canvas.offsetHeight;
  if (!width || !height) return;

  const sensitivity = e.ctrlKey ? 0.008 : 0.0025;
  const zoomFactor = Math.exp(-e.deltaY * sensitivity);
  setZoomAtPoint(S.view.zoom * zoomFactor, e.offsetX, e.offsetY, width, height);
  renderVisible();
}

function handlePointerDown(e) {
  if (e.button !== 0 || S.renderR === null) return;
  const canvas = e.currentTarget;
  S.view.pointerId = e.pointerId;
  S.view.lastX = e.offsetX;
  S.view.lastY = e.offsetY;
  S.view.moved = false;
  canvas.classList.add('dragging');
  canvas.setPointerCapture(e.pointerId);
}

function handlePointerMove(e) {
  handleCursorMove(e);

  if (S.view.pointerId !== e.pointerId || S.renderR === null) return;
  const canvas = e.currentTarget;
  const width = canvas.offsetWidth;
  const height = canvas.offsetHeight;
  if (!width || !height) return;

  const baseScale = cssBaseScale(width, height, S.renderR);
  const dx = e.offsetX - S.view.lastX;
  const dy = e.offsetY - S.view.lastY;
  if (dx === 0 && dy === 0) return;

  S.view.panX -= dx / (baseScale * S.view.zoom);
  S.view.panY += dy / (baseScale * S.view.zoom);
  S.view.lastX = e.offsetX;
  S.view.lastY = e.offsetY;
  S.view.moved = true;
  clampViewport();
  renderVisible();
}

function endPointerDrag(e) {
  if (S.view.pointerId !== e.pointerId) return;
  e.currentTarget.classList.remove('dragging');
  S.view.pointerId = null;
}

function handleViewportDoubleClick() {
  resetViewport(true);
}

// ── Resize handling ───────────────────────────────────────────────────────────
const resizeObs = new ResizeObserver(() => {
  if (S.idx >= 0 && S.idx < S.scans.length) {
    renderVisible();
  }
  drawColorbar('left-cb',  'left-cb-labels',  S.leftField);
  drawColorbar('right-cb', 'right-cb-labels', S.rightField);
});

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  // Draw empty colorbars immediately
  drawColorbar('left-cb',  'left-cb-labels',  S.leftField);
  drawColorbar('right-cb', 'right-cb-labels', S.rightField);

  // Set date picker to today
  const today = new Date().toISOString().slice(0, 10);
  document.getElementById('date-input').value = today;

  // Wire up tab clicks
  document.querySelectorAll('.tabs .tab').forEach(btn => {
    btn.addEventListener('click', () => {
      const side  = btn.closest('.tabs').dataset.side;
      const field = btn.dataset.field;
      switchField(side, field);
    });
  });

  // Playback buttons
  document.getElementById('btn-first').addEventListener('click', goFirst);
  document.getElementById('btn-rew').addEventListener('click',   stepBack);
  document.getElementById('btn-play').addEventListener('click',  togglePlay);
  document.getElementById('btn-ff').addEventListener('click',    stepFwd);
  document.getElementById('btn-last').addEventListener('click',  goLast);

  // Hold-to-repeat on rew / ff
  let holdTimer = null;
  function startHold(dir) {
    holdTimer = setInterval(() => dir > 0 ? setIdx(S.idx + 1) : setIdx(S.idx - 1), 200);
  }
  function stopHold() { clearInterval(holdTimer); holdTimer = null; }
  document.getElementById('btn-rew').addEventListener('mousedown', () => startHold(-1));
  document.getElementById('btn-ff').addEventListener('mousedown',  () => startHold( 1));
  ['mouseup','mouseleave'].forEach(ev => {
    document.getElementById('btn-rew').addEventListener(ev, stopHold);
    document.getElementById('btn-ff').addEventListener(ev,  stopHold);
  });

  // Scrubber
  document.getElementById('scrubber').addEventListener('input', e => {
    pause();
    S.idx = +e.target.value;
    updateScrubber();
    renderCurrent();
  });

  // Live toggle
  document.getElementById('live-btn').addEventListener('click', () => toggleLive(!S.isLive));

  // Date picker
  document.getElementById('date-input').addEventListener('change', handleDateChange);

  // Display toggles
  document.getElementById('tog-rings').addEventListener('change', e => {
    S.showRings = e.target.checked;
    renderCurrent();
  });
  document.getElementById('tog-bh').addEventListener('change', e => {
    S.showBH = e.target.checked;
    renderCurrent();
  });
  document.getElementById('tog-snr').addEventListener('change', e => {
    S.snrFilter = e.target.checked;
    document.getElementById('snr-thresh-row').style.display = e.target.checked ? 'block' : 'none';
    renderCurrent();
  });
  document.getElementById('snr-thresh').addEventListener('change', e => {
    S.snrThresh = parseFloat(e.target.value) || 1.003;
    if (S.snrFilter) renderCurrent();
  });

  // Cursor readout — attach to both canvases
  ['left-canvas', 'right-canvas'].forEach(id => {
    const c = document.getElementById(id);
    c.addEventListener('pointermove', handlePointerMove);
    c.addEventListener('pointerdown', handlePointerDown);
    c.addEventListener('pointerup', endPointerDrag);
    c.addEventListener('pointercancel', endPointerDrag);
    c.addEventListener('lostpointercapture', endPointerDrag);
    c.addEventListener('wheel', handleViewportWheel, { passive: false });
    c.addEventListener('dblclick', handleViewportDoubleClick);
    c.addEventListener('mouseleave', clearCursor);
  });

  // Initialise cursor card labels
  updateCursorLabels();

  // ResizeObserver on both panel wraps
  resizeObs.observe(document.getElementById('left-wrap'));
  resizeObs.observe(document.getElementById('right-wrap'));

  // Kick off — test mode pre-selects the injected date; otherwise start live
  if (TEST_DATE) {
    const iso = `${TEST_DATE.slice(0,4)}-${TEST_DATE.slice(4,6)}-${TEST_DATE.slice(6,8)}`;
    document.getElementById('date-input').value = iso;
    S.viewDate = TEST_DATE;
    await toggleLive(false);   // turns off live, enables date picker
    await handleDateChange();  // loads scans for TEST_DATE
  } else {
    await toggleLive(true);
  }
}

document.addEventListener('DOMContentLoaded', init);
</script>
