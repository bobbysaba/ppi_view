<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lidar VAD Viewer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Catppuccin Mocha palette ──────────────────────────────────────────── */
    :root {
      --bg:      #1e1e2e;
      --surface: #181825;
      --border:  #313244;
      --muted:   #45475a;
      --text:    #cdd6f4;
      --subtext: #a6adc8;
      --blue:    #89b4fa;
      --green:   #a6e3a1;
      --red:     #f38ba8;
      --orange:  #fab387;
      --purple:  #cba6f7;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: ui-monospace, 'Cascadia Code', monospace;
      font-size: 13px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ────────────────────────────────────────────────────────────── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 7px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      gap: 8px;
    }

    h1 {
      font-size: 0.82rem;
      color: #cfe2ff;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    #status-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.72rem;
      color: var(--subtext);
      flex-wrap: wrap;
    }

    #conn-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--green);
      transition: background 0.3s;
      flex-shrink: 0;
    }
    #conn-dot.stale { background: var(--orange); }
    #conn-dot.off   { background: var(--red); }
    #last-update.stale { color: var(--orange); }

    #date-input {
      background: var(--muted);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 3px 6px;
      border-radius: 4px;
      font-family: inherit;
      font-size: 0.72rem;
      color-scheme: dark;
    }

    .tog-row {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.68rem;
      padding: 2px 0;
      cursor: pointer;
      color: var(--subtext);
      user-select: none;
    }
    .tog-row:hover { color: var(--text); }
    .tog-row input[type="checkbox"] { accent-color: var(--blue); cursor: pointer; }

    /* ── Main two-column area ──────────────────────────────────────────────── */
    #main {
      flex: 1;
      min-height: 0;
      display: flex;
      gap: 9px;
      padding: 9px;
      overflow: hidden;
    }

    /* ── Cards ─────────────────────────────────────────────────────────────── */
    .vad-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }

    .panel-hdr {
      padding: 5px 8px 4px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 3px;
      flex-shrink: 0;
    }

    .panel-title {
      font-size: 0.68rem;
      color: var(--subtext);
      text-transform: uppercase;
      letter-spacing: 0.10em;
    }

    .cb-canvas {
      display: block;
      width: 100%;
      height: 12px;
      border-radius: 2px;
    }

    .cb-labels {
      display: flex;
      justify-content: space-between;
      font-size: 0.58rem;
      color: var(--subtext);
    }

    /* ── Hodograph (left) ──────────────────────────────────────────────────── */
    #hodo-card {
      flex: 1;
    }

    .canvas-wrap {
      flex: 1;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: var(--bg);
    }

    #hodo-canvas { display: block; }

    #kine-card {
      border-top: 1px solid var(--border);
      padding: 6px 10px;
      flex-shrink: 0;
    }

    #kine-card .card-title {
      font-size: 0.60rem;
      color: var(--subtext);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 4px;
    }

    #kine-card .cv-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 2px 0;
      font-size: 0.68rem;
      border-bottom: 1px solid var(--border);
    }
    #kine-card .cv-row:last-child { border-bottom: none; }
    #kine-card .cv-label { color: var(--subtext); }
    #kine-card .cv-val   { font-weight: 600; color: var(--text); }

    /* ── Time-height column (right) ────────────────────────────────────────── */
    #th-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 9px;
      min-height: 0;
    }

    #wspd-card, #wdir-card {
      flex: 1;
      min-height: 0;
    }

    .th-wrap {
      flex: 1;
      min-height: 0;
      overflow: hidden;
      background: var(--bg);
    }

    .th-canvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: crosshair;
      user-select: none;
    }

    /* ── Controls bar ───────────────────────────────────────────────────────── */
    #controls {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 5px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    #playback { display: flex; gap: 3px; flex-shrink: 0; }

    .pb-btn {
      background: var(--muted);
      color: var(--text);
      border: 1px solid var(--border);
      width: 30px; height: 26px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.85rem;
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.15s, color 0.15s;
      user-select: none;
    }
    .pb-btn:hover:not(:disabled) { border-color: var(--subtext); }
    .pb-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    #btn-play.playing { border-color: var(--blue); color: var(--blue); }

    #scrubber-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 1px;
      min-width: 0;
    }

    #scrubber {
      width: 100%;
      accent-color: var(--blue);
      cursor: pointer;
      height: 16px;
    }

    #scrub-label {
      font-size: 0.62rem;
      color: var(--subtext);
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #cursor-bar {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 3px 14px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
      font-size: 0.68rem;
      color: var(--subtext);
      min-height: 22px;
    }
    .cur-item { display: flex; gap: 5px; }
    .cur-lbl  { color: var(--muted); }
    .cur-val  { color: var(--text); font-weight: 600; min-width: 6ch; }
  </style>
</head>
<body>

<header>
  <a href="/" style="color:var(--subtext);text-decoration:none;font-size:0.72rem;letter-spacing:0.06em;" title="Back to dashboard">&#8592; Dashboard</a>
  <h1>VAD Viewer</h1>
  <div id="status-bar">
    <span id="conn-dot"></span>
    <span id="status-msg">No data</span>
    <input type="date" id="date-input">
    <label class="tog-row"><input type="checkbox" id="tog-r2" checked> r² filter</label>
    <div id="r2-thresh-row" style="font-size:0.68rem; color:var(--subtext);">
      Threshold&nbsp;
      <input type="number" id="r2-thresh" value="0.30" step="0.01" min="0" max="1"
             style="width:52px; background:var(--muted); color:var(--text); border:1px solid var(--border);
                    border-radius:3px; padding:1px 4px; font-family:inherit; font-size:0.68rem;">
    </div>
  </div>
</header>

<div id="controls">
  <div id="playback">
    <button class="pb-btn" id="btn-first" title="First step"    disabled>⏮</button>
    <button class="pb-btn" id="btn-prev"  title="Previous step" disabled>⏪</button>
    <button class="pb-btn" id="btn-play"  title="Play / Pause"  disabled>▶</button>
    <button class="pb-btn" id="btn-next"  title="Next step"     disabled>⏩</button>
    <button class="pb-btn" id="btn-last"  title="Last step"     disabled>⏭</button>
  </div>
  <div id="scrubber-wrap">
    <input type="range" id="scrubber" min="0" max="0" value="0" step="1" disabled>
    <div id="scrub-label">-- UTC  (0 / 0)</div>
  </div>
</div>

<div id="main">
  <!-- Left: Hodograph -->
  <div class="vad-card" id="hodo-card">
    <div class="panel-hdr">
      <div class="panel-title" id="hodo-title">Hodograph</div>
      <canvas class="cb-canvas" id="hodo-cb"></canvas>
      <div class="cb-labels">
        <span>0 km</span>
        <span id="hodo-cb-max">4 km AGL</span>
      </div>
    </div>
    <div class="canvas-wrap" id="hodo-wrap">
      <canvas id="hodo-canvas"></canvas>
    </div>
    <div id="kine-card">
      <div class="card-title">Kinematics</div>
      <div class="cv-row"><span class="cv-label">Shear 0–500 m</span><span class="cv-val" id="ks-500">--</span></div>
      <div class="cv-row"><span class="cv-label">GRW 0–500 m</span><span class="cv-val"  id="kg-500">--</span></div>
      <div class="cv-row"><span class="cv-label">Shear 0–1 km</span><span class="cv-val" id="ks-1">--</span></div>
      <div class="cv-row"><span class="cv-label">GRW 0–1 km</span><span class="cv-val"  id="kg-1">--</span></div>
      <div class="cv-row"><span class="cv-label">Shear 0–3 km</span><span class="cv-val" id="ks-3">--</span></div>
      <div class="cv-row"><span class="cv-label">GRW 0–3 km</span><span class="cv-val"  id="kg-3">--</span></div>
    </div>
  </div>

  <!-- Right: Time-height stacked -->
  <div id="th-col">
    <div class="vad-card" id="wspd-card">
      <div class="panel-hdr">
        <div class="panel-title">Wind Speed (m/s)</div>
        <canvas class="cb-canvas" id="wspd-cb"></canvas>
        <div class="cb-labels"><span>0</span><span>12.5</span><span>25</span></div>
      </div>
      <div class="th-wrap">
        <canvas id="wspd-canvas" class="th-canvas"></canvas>
      </div>
    </div>
    <div class="vad-card" id="wdir-card">
      <div class="panel-hdr">
        <div class="panel-title">Wind Direction (°)</div>
        <canvas class="cb-canvas" id="wdir-cb"></canvas>
        <div class="cb-labels"><span>0°</span><span>180°</span><span>360°</span></div>
      </div>
      <div class="th-wrap">
        <canvas id="wdir-canvas" class="th-canvas"></canvas>
      </div>
    </div>
  </div>
</div>

<div id="cursor-bar">
  <span class="cur-item"><span class="cur-lbl">time</span><span class="cur-val" id="cur-time">--</span></span>
  <span class="cur-item"><span class="cur-lbl">height</span><span class="cur-val" id="cur-height">--</span></span>
  <span class="cur-item"><span class="cur-lbl">value</span><span class="cur-val" id="cur-value">--</span></span>
  <span class="cur-item" id="cur-wspd-item" style="display:none"><span class="cur-lbl">wspd</span><span class="cur-val" id="cur-wspd">--</span></span>
  <span class="cur-item" id="cur-wdir-item" style="display:none"><span class="cur-lbl">wdir</span><span class="cur-val" id="cur-wdir">--</span></span>
</div>

<script>
'use strict';
const TEST_VAD_DATE = {{ test_vad_date | tojson }};
const PHASE_CM      = {{ phase_cm | tojson }};  // 36 × [R,G,B], one per 10° bin

const MAX_HEIGHT_KM  = 4.0;
const MAX_SPEED_RING = 25;   // m/s — outermost hodograph ring

// ── Colormaps ─────────────────────────────────────────────────────────────────

// Viridis-like sequential (purple → teal → yellow) for hodograph height
const HEIGHT_CM = [
  [130,  60, 180],  // 0.00
  [ 59,  82, 139],  // 0.25
  [ 33, 145, 140],  // 0.50
  [ 94, 201,  98],  // 0.75
  [253, 231,  37],  // 1.00
];

// Wind speed: near-white → blue → purple (0 – 25 m/s)
const WSPD_CM = [
  [240, 248, 255],  // 0 m/s
  [100, 180, 255],  // ~6
  [ 55, 120, 220],  // ~12
  [ 80,  40, 200],  // ~19
  [120,   0, 160],  // 25 m/s
];

function lerp(a, b, t) { return a + (b - a) * t; }

function sampleCM(stops, t) {
  t = Math.max(0, Math.min(1, t));
  const pos = t * (stops.length - 1);
  const i   = Math.min(Math.floor(pos), stops.length - 2);
  const f   = pos - i;
  return [
    Math.round(lerp(stops[i][0], stops[i+1][0], f)),
    Math.round(lerp(stops[i][1], stops[i+1][1], f)),
    Math.round(lerp(stops[i][2], stops[i+1][2], f)),
  ];
}

function heightColor(t)  { return sampleCM(HEIGHT_CM, t); }
function wspdColor(t)    { return sampleCM(WSPD_CM, t); }

function wdirColor(deg) {
  if (deg === null || deg === undefined || isNaN(deg)) return null;
  const idx = Math.floor(((deg % 360) + 360) % 360 / 10) % 36;
  return PHASE_CM[idx];
}

// ── Application state ─────────────────────────────────────────────────────────
const D = { timestamps: [], height_km: [], wdir: [], wspd: [], r_sq: [] };
const S = {
  timeIdx: 0, r2Filter: true, r2Thresh: 0.30, hClip: 0,
  // Zoom window — null means full range
  zoom: { tMin: null, tMax: null, hMin: null, hMax: null },
  // Drag state for th canvas selection
  drag: { active: false, startX: 0, startY: 0, endX: 0, endY: 0, canvas: null },
};

// Pre-rendered offscreen canvases for time-height images
let wspdOff = null, wdirOff = null;

// ── DOM refs ──────────────────────────────────────────────────────────────────
const hodoCvs   = document.getElementById('hodo-canvas');
const wspdCvs   = document.getElementById('wspd-canvas');
const wdirCvs   = document.getElementById('wdir-canvas');
const hodoCbCvs = document.getElementById('hodo-cb');
const wspdCbCvs = document.getElementById('wspd-cb');
const wdirCbCvs = document.getElementById('wdir-cb');
const scrubber     = document.getElementById('scrubber');
const scrubLbl     = document.getElementById('scrub-label');
const dateInput    = document.getElementById('date-input');
const togR2        = document.getElementById('tog-r2');
const r2ThreshRow  = document.getElementById('r2-thresh-row');
const r2ThreshInp  = document.getElementById('r2-thresh');
const connDot      = document.getElementById('conn-dot');
const statusMsg = document.getElementById('status-msg');
const hodoTitle = document.getElementById('hodo-title');
const hodoCbMax = document.getElementById('hodo-cb-max');
const btnFirst  = document.getElementById('btn-first');
const btnPrev   = document.getElementById('btn-prev');
const btnPlay   = document.getElementById('btn-play');
const btnNext   = document.getElementById('btn-next');
const btnLast   = document.getElementById('btn-last');

// ── Utilities ─────────────────────────────────────────────────────────────────
function fmtUTC(unix) {
  const d  = new Date(unix * 1000);
  const hh = d.getUTCHours().toString().padStart(2, '0');
  const mm = d.getUTCMinutes().toString().padStart(2, '0');
  return `${hh}:${mm} UTC`;
}

// Apply r² mask: set any gate to null where r_sq < thresh
function applyR2Mask(field2d, r2, thresh) {
  return field2d.map((row, t) =>
    row.map((v, h) => {
      if (v === null || v === undefined) return null;
      const rq = r2[t]?.[h];
      if (rq === null || rq === undefined || rq < thresh) return null;
      return v;
    })
  );
}

// ── Colorbar ──────────────────────────────────────────────────────────────────
function drawColorbar(canvas, cmFn) {
  const W = Math.max(100, Math.round(canvas.getBoundingClientRect().width));
  const H = 12;
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');
  const img = ctx.createImageData(W, H);
  for (let x = 0; x < W; x++) {
    const [r, g, b] = cmFn(x / (W - 1));
    for (let y = 0; y < H; y++) {
      const i = (y * W + x) * 4;
      img.data[i] = r; img.data[i+1] = g; img.data[i+2] = b; img.data[i+3] = 255;
    }
  }
  ctx.putImageData(img, 0, 0);
}

function redrawColorbars() {
  drawColorbar(hodoCbCvs, t => heightColor(t));
  drawColorbar(wspdCbCvs, t => wspdColor(t));
  drawColorbar(wdirCbCvs, t => wdirColor(t * 360) || [30, 30, 46]);
}

// ── Zoom helpers ──────────────────────────────────────────────────────────────
function zoomedTRange() {
  const nT = D.timestamps.length;
  if (!nT) return { t0: 0, t1: 0 };
  const t0 = S.zoom.tMin !== null ? S.zoom.tMin : 0;
  const t1 = S.zoom.tMax !== null ? S.zoom.tMax : nT - 1;
  return { t0: Math.max(0, t0), t1: Math.min(nT - 1, t1) };
}

function zoomedHRange() {
  const nH = S.hClip;
  if (!nH) return { h0: 0, h1: 0 };
  const h0 = S.zoom.hMin !== null ? S.zoom.hMin : 0;
  const h1 = S.zoom.hMax !== null ? S.zoom.hMax : nH - 1;
  return { h0: Math.max(0, h0), h1: Math.min(nH - 1, h1) };
}

function resetZoom() {
  S.zoom = { tMin: null, tMax: null, hMin: null, hMax: null };
  // Restore scrubber to full range
  const nT = D.timestamps.length;
  if (nT) {
    scrubber.min = 0;
    scrubber.max = nT - 1;
    S.timeIdx = Math.max(0, Math.min(S.timeIdx, nT - 1));
    scrubber.value = S.timeIdx;
  }
  renderAll();
}

function applyZoom(tMin, tMax, hMin, hMax) {
  S.zoom.tMin = tMin; S.zoom.tMax = tMax;
  S.zoom.hMin = hMin; S.zoom.hMax = hMax;
  // Clamp timeIdx into the new window
  S.timeIdx = Math.max(tMin, Math.min(tMax, S.timeIdx));
  scrubber.min   = tMin;
  scrubber.max   = tMax;
  scrubber.value = S.timeIdx;
  renderAll();
}

// ── Time-height offscreen pre-render ──────────────────────────────────────────
function buildTHOffscreen(masked2d, cmFn, vmin, vmax) {
  const { t0, t1 } = zoomedTRange();
  const { h0, h1 } = zoomedHRange();
  const nT = t1 - t0 + 1;
  const nH = h1 - h0 + 1;
  if (nT <= 0 || nH <= 0) return null;

  const tmp = document.createElement('canvas');
  tmp.width = nT; tmp.height = nH;
  const ctx = tmp.getContext('2d');
  const img = ctx.createImageData(nT, nH);
  const BG  = [30, 30, 46];

  for (let ti = 0; ti < nT; ti++) {
    for (let hi = 0; hi < nH; hi++) {
      const v  = masked2d[t0 + ti]?.[h0 + hi];
      const py = nH - 1 - hi;       // flip: height 0 at bottom
      const pi = (py * nT + ti) * 4;
      if (v === null || v === undefined) {
        img.data[pi] = BG[0]; img.data[pi+1] = BG[1]; img.data[pi+2] = BG[2];
      } else {
        const norm = Math.max(0, Math.min(1, (v - vmin) / (vmax - vmin)));
        const [r, g, b] = cmFn(norm);
        img.data[pi] = r; img.data[pi+1] = g; img.data[pi+2] = b;
      }
      img.data[pi+3] = 255;
    }
  }
  ctx.putImageData(img, 0, 0);
  return tmp;
}

function rebuildOffscreens() {
  const mWspd = S.r2Filter ? applyR2Mask(D.wspd, D.r_sq, S.r2Thresh) : D.wspd;
  const mWdir = S.r2Filter ? applyR2Mask(D.wdir, D.r_sq, S.r2Thresh) : D.wdir;
  wspdOff = buildTHOffscreen(mWspd, t => wspdColor(t),  0, 25);
  wdirOff = buildTHOffscreen(mWdir, t => wdirColor(t * 360) || [30,30,46], 0, 360);
}

// ── Time-height display render ────────────────────────────────────────────────
const TH_M = { top: 5, right: 8, bottom: 28, left: 42 };

function drawTH(canvas, offscreen) {
  const dpr  = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  const CW   = Math.round(rect.width * dpr);
  const CH   = Math.round(rect.height * dpr);
  if (canvas.width !== CW || canvas.height !== CH) { canvas.width = CW; canvas.height = CH; }

  const ctx = canvas.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  const W = rect.width, H = rect.height;

  ctx.fillStyle = '#1e1e2e';
  ctx.fillRect(0, 0, W, H);

  const pX = TH_M.left,   pY = TH_M.top;
  const pW = W - TH_M.left - TH_M.right;
  const pH = H - TH_M.top  - TH_M.bottom;
  if (pW <= 0 || pH <= 0) return;

  if (offscreen) {
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(offscreen, pX, pY, pW, pH);
  }

  // Vertical cursor line — position relative to zoomed time window
  const { t0, t1 } = zoomedTRange();
  const { h0, h1 } = zoomedHRange();
  const nTZoom = t1 - t0 + 1;
  if (nTZoom > 0) {
    const cx = pX + (S.timeIdx - t0 + 0.5) / nTZoom * pW;
    ctx.strokeStyle = 'rgba(205, 214, 244, 0.85)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(cx, pY);
    ctx.lineTo(cx, pY + pH);
    ctx.stroke();
  }

  ctx.font = '10px ui-monospace, monospace';

  // Y-axis: height labels for zoomed range
  const hLo  = D.height_km[h0] ?? 0;
  const hHi  = D.height_km[h1] ?? MAX_HEIGHT_KM;
  const hSpan = hHi - hLo;
  ctx.textAlign = 'right';
  ctx.textBaseline = 'middle';
  const hStep = hSpan <= 1 ? 0.25 : hSpan <= 2 ? 0.5 : 1;
  for (let km = Math.ceil(hLo / hStep) * hStep; km <= hHi + 1e-9; km += hStep) {
    if (km > hHi + 1e-9) break;
    const frac = hSpan > 0 ? (km - hLo) / hSpan : 0;
    const py   = pY + pH - frac * pH;
    ctx.fillStyle = '#a6adc8';
    ctx.fillText(km % 1 === 0 ? `${km}` : km.toFixed(2), pX - 4, py);
    ctx.strokeStyle = '#45475a';
    ctx.lineWidth = 0.5;
    ctx.beginPath(); ctx.moveTo(pX - 3, py); ctx.lineTo(pX, py); ctx.stroke();
  }

  // X-axis: time labels for zoomed range
  if (nTZoom > 0) {
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    const nTicks = Math.min(6, nTZoom);
    for (let i = 0; i <= nTicks; i++) {
      const ti = t0 + Math.min(nTZoom - 1, Math.round(i * (nTZoom - 1) / nTicks));
      const px = pX + (ti - t0 + 0.5) / nTZoom * pW;
      ctx.fillStyle = '#a6adc8';
      ctx.fillText(fmtUTC(D.timestamps[ti]), px, pY + pH + 3);
    }
  }

  ctx.strokeStyle = '#313244';
  ctx.lineWidth = 1;
  ctx.strokeRect(pX, pY, pW, pH);

  // Draw drag selection rectangle if active on this canvas
  if (S.drag.active && S.drag.canvas === canvas) {
    const r = canvas.getBoundingClientRect();
    const sx = S.drag.startX - r.left - TH_M.left;
    const ex = S.drag.endX   - r.left - TH_M.left;
    const sy = S.drag.startY - r.top  - TH_M.top;
    const ey = S.drag.endY   - r.top  - TH_M.top;
    const rx = Math.min(sx, ex) + pX - TH_M.left;
    const ry = Math.min(sy, ey) + pY - TH_M.top;
    const rw = Math.abs(ex - sx);
    const rh = Math.abs(ey - sy);
    ctx.save();
    ctx.strokeStyle = 'rgba(137, 180, 250, 0.85)';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([4, 4]);
    ctx.strokeRect(rx, ry, rw, rh);
    ctx.fillStyle = 'rgba(137, 180, 250, 0.12)';
    ctx.fillRect(rx, ry, rw, rh);
    ctx.restore();
  }
}

// ── Hodograph render ──────────────────────────────────────────────────────────
function drawHodograph() {
  const wrap = document.getElementById('hodo-wrap');
  const dpr  = window.devicePixelRatio || 1;
  const rect = wrap.getBoundingClientRect();
  const side = Math.min(rect.width, rect.height);
  const CW   = Math.round(side * dpr);
  if (hodoCvs.width !== CW || hodoCvs.height !== CW) {
    hodoCvs.width = CW; hodoCvs.height = CW;
  }
  hodoCvs.style.width  = `${side}px`;
  hodoCvs.style.height = `${side}px`;

  const ctx = hodoCvs.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  const W = side, H = side;

  ctx.fillStyle = '#1e1e2e';
  ctx.fillRect(0, 0, W, H);

  const margin = 38;
  const cx = W / 2, cy = H / 2;
  const radius = (side / 2) - margin;
  const scale  = radius / MAX_SPEED_RING;

  // Speed rings
  for (const spd of [5, 10, 15, 20, 25]) {
    const r = spd * scale;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, 2 * Math.PI);
    ctx.strokeStyle = spd === 25 ? '#45475a' : '#313244';
    ctx.lineWidth = spd === 25 ? 1.2 : 0.7;
    ctx.stroke();
    ctx.fillStyle = '#45475a';
    ctx.font = '9px ui-monospace, monospace';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'bottom';
    ctx.fillText(`${spd}`, cx + r + 2, cy - 1);
  }

  // Cardinal axes (dashed)
  ctx.strokeStyle = '#45475a';
  ctx.lineWidth = 0.7;
  ctx.setLineDash([3, 4]);
  ctx.beginPath(); ctx.moveTo(cx, cy - radius - 6); ctx.lineTo(cx, cy + radius + 6); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx - radius - 6, cy); ctx.lineTo(cx + radius + 6, cy); ctx.stroke();
  ctx.setLineDash([]);

  ctx.fillStyle = '#a6adc8';
  ctx.font = '10px ui-monospace, monospace';
  ctx.textAlign = 'center'; ctx.textBaseline = 'bottom'; ctx.fillText('E', cx, cy - radius - 8);
  ctx.textBaseline = 'top';                               ctx.fillText('W', cx, cy + radius + 8);
  ctx.textAlign = 'right';  ctx.textBaseline = 'middle';  ctx.fillText('N', cx - radius - 8, cy);
  ctx.textAlign = 'left';                                  ctx.fillText('S', cx + radius + 8, cy);

  if (!D.timestamps.length) return;

  const wspd = D.wspd[S.timeIdx];
  const wdir = D.wdir[S.timeIdx];
  const r_sq = D.r_sq[S.timeIdx];
  if (!wspd || !wdir) return;

  const nH   = S.hClip;
  const { h0, h1 } = zoomedHRange();
  const maxH = D.height_km[h1] ?? MAX_HEIGHT_KM;
  const minH = D.height_km[h0] ?? 0;
  const hSpan = maxH - minH;

  // Collect valid (U, V, heightFraction) points within zoomed height range
  const pts = [];
  for (let h = h0; h <= h1; h++) {
    const sp = wspd[h], wd = wdir[h], rq = r_sq?.[h];
    if (sp === null || wd === null || sp === undefined || wd === undefined) continue;
    if (S.r2Filter && rq !== null && rq !== undefined && rq < S.r2Thresh) continue;
    const rad = wd * Math.PI / 180;
    pts.push({
      px: cx - sp * Math.sin(rad) * scale,
      py: cy + sp * Math.cos(rad) * scale,
      t:  hSpan > 0 ? (D.height_km[h] - minH) / hSpan : 0,
    });
  }

  if (!pts.length) return;

  // Line segments colored by mid-segment height
  for (let i = 1; i < pts.length; i++) {
    const [r, g, b] = heightColor((pts[i-1].t + pts[i].t) / 2);
    ctx.strokeStyle = `rgb(${r},${g},${b})`;
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(pts[i-1].px, pts[i-1].py);
    ctx.lineTo(pts[i].px,   pts[i].py);
    ctx.stroke();
  }

  // Dots
  for (const p of pts) {
    const [r, g, b] = heightColor(p.t);
    ctx.fillStyle = `rgb(${r},${g},${b})`;
    ctx.beginPath();
    ctx.arc(p.px, p.py, 2.5, 0, 2 * Math.PI);
    ctx.fill();
  }

  // Update title with current timestamp
  if (D.timestamps[S.timeIdx] !== undefined) {
    hodoTitle.textContent = `Hodograph – ${fmtUTC(D.timestamps[S.timeIdx])}`;
  }
}

// ── Kinematics ────────────────────────────────────────────────────────────────
// Linear interpolation of u/v onto an exact height level from the profile arrays.
// Returns null if the target height is outside the available valid data range.
function interpUV(wspd, wdir, r2, heightKm, targetKm) {
  const { h0, h1 } = zoomedHRange();
  let lo = null, hi = null;
  for (let h = h0; h <= h1; h++) {
    const sp = wspd[h], wd = wdir[h], rq = r2?.[h];
    if (sp === null || sp === undefined || wd === null || wd === undefined) continue;
    if (S.r2Filter && rq !== null && rq !== undefined && rq < S.r2Thresh) continue;
    if (heightKm[h] <= targetKm) lo = h;
    if (heightKm[h] >= targetKm && hi === null) hi = h;
  }
  if (lo === null || hi === null) return null;
  if (lo === hi) {
    const rad = wdir[lo] * Math.PI / 180;
    return { u: -wspd[lo] * Math.sin(rad), v: wspd[lo] * Math.cos(rad) };
  }
  const t   = (targetKm - heightKm[lo]) / (heightKm[hi] - heightKm[lo]);
  const r0  = wdir[lo] * Math.PI / 180, r1 = wdir[hi] * Math.PI / 180;
  const u0  = -wspd[lo] * Math.sin(r0), v0 = wspd[lo] * Math.cos(r0);
  const u1  = -wspd[hi] * Math.sin(r1), v1 = wspd[hi] * Math.cos(r1);
  return { u: u0 + (u1 - u0) * t, v: v0 + (v1 - v0) * t };
}

// Mean u/v over a layer by averaging all valid levels within [0, topKm]
function layerMeanUV(wspd, wdir, r2, heightKm, topKm) {
  const { h0, h1 } = zoomedHRange();
  let su = 0, sv = 0, n = 0;
  for (let h = h0; h <= h1; h++) {
    if (heightKm[h] > topKm) break;
    const sp = wspd[h], wd = wdir[h], rq = r2?.[h];
    if (sp === null || sp === undefined || wd === null || wd === undefined) continue;
    if (S.r2Filter && rq !== null && rq !== undefined && rq < S.r2Thresh) continue;
    const rad = wd * Math.PI / 180;
    su += -sp * Math.sin(rad);
    sv +=  sp * Math.cos(rad);
    n++;
  }
  return n > 0 ? { u: su / n, v: sv / n } : null;
}

function uvToSpdDir(u, v) {
  const spd = Math.sqrt(u*u + v*v);
  // atan2(-u, v) gives the FROM direction (met convention)
  let dir = Math.atan2(-u, v) * 180 / Math.PI;
  if (dir < 0) dir += 360;
  return { spd, dir };
}

function computeKinematics() {
  const wspd = D.wspd[S.timeIdx];
  const wdir = D.wdir[S.timeIdx];
  const r2   = D.r_sq[S.timeIdx];
  const hkm  = D.height_km;
  const { h0, h1 } = zoomedHRange();

  const layers = [
    { topKm: 0.5, sId: 'ks-500', gId: 'kg-500' },
    { topKm: 1.0, sId: 'ks-1',   gId: 'kg-1'   },
    { topKm: 3.0, sId: 'ks-3',   gId: 'kg-3'   },
  ];

  // Surface wind: lowest valid level within zoomed range
  let sfcUV = null;
  for (let h = h0; h <= h1; h++) {
    const sp = wspd?.[h], wd = wdir?.[h], rq = r2?.[h];
    if (sp === null || sp === undefined || wd === null || wd === undefined) continue;
    if (S.r2Filter && rq !== null && rq !== undefined && rq < S.r2Thresh) continue;
    const rad = wd * Math.PI / 180;
    sfcUV = { u: -sp * Math.sin(rad), v: sp * Math.cos(rad) };
    break;
  }

  for (const { topKm, sId, gId } of layers) {
    const maxAvail = hkm[h1] ?? 0;
    if (!wspd || !wdir || !sfcUV || maxAvail < topKm * 0.5) {
      document.getElementById(sId).textContent = '--';
      document.getElementById(gId).textContent = '--';
      continue;
    }

    const topUV  = interpUV(wspd, wdir, r2, hkm, topKm);
    const shear  = topUV ? Math.sqrt((topUV.u - sfcUV.u)**2 + (topUV.v - sfcUV.v)**2) : null;
    const meanUV = layerMeanUV(wspd, wdir, r2, hkm, topKm);
    const grw    = meanUV ? uvToSpdDir(meanUV.u, meanUV.v) : null;

    document.getElementById(sId).textContent = shear !== null ? `${shear.toFixed(1)} m/s` : '--';
    document.getElementById(gId).textContent = grw   !== null ? `${grw.spd.toFixed(1)} m/s ${Math.round(grw.dir)}°` : '--';
  }
}


function renderAll() {
  drawHodograph();
  drawTH(wspdCvs, wspdOff);
  drawTH(wdirCvs, wdirOff);
  updateScrubLabel();
  computeKinematics();
}

function updateScrubLabel() {
  const nT = D.timestamps.length;
  if (nT > 0 && D.timestamps[S.timeIdx] !== undefined) {
    scrubLbl.textContent = `${fmtUTC(D.timestamps[S.timeIdx])}  (${S.timeIdx + 1} / ${nT})`;
  } else {
    scrubLbl.textContent = '-- UTC  (0 / 0)';
  }
}

// ── Data loading ──────────────────────────────────────────────────────────────
function loadData(date) {
  statusMsg.textContent = 'Loading…';
  connDot.className = '';
  fetch(`/vad/data?date=${date}`)
    .then(r => { if (!r.ok) throw new Error(r.statusText); return r.json(); })
    .then(data => {
      D.timestamps = data.timestamps || [];
      D.height_km  = data.height_km  || [];
      D.wdir       = data.wdir       || [];
      D.wspd       = data.wspd       || [];
      D.r_sq       = data.r_sq       || [];

      // Clip height axis to MAX_HEIGHT_KM
      let hc = D.height_km.findIndex(h => h > MAX_HEIGHT_KM);
      S.hClip = hc < 0 ? D.height_km.length : hc;

      const maxHLabel = D.height_km[S.hClip - 1]?.toFixed(1) ?? MAX_HEIGHT_KM.toFixed(1);
      hodoCbMax.textContent = `${maxHLabel} km AGL`;

      const nT = D.timestamps.length;
      scrubber.max     = Math.max(0, nT - 1);
      scrubber.value   = 0;
      scrubber.disabled = nT === 0;
      btnFirst.disabled = btnPrev.disabled = btnPlay.disabled =
      btnNext.disabled  = btnLast.disabled = nT === 0;
      S.timeIdx = 0;

      statusMsg.textContent = `${nT} time steps · ${S.hClip} height levels`;

      rebuildOffscreens();
      renderAll();
    })
    .catch(err => {
      statusMsg.textContent = `Error: ${err.message}`;
      connDot.className = 'off';
    });
}

// ── Event handlers ────────────────────────────────────────────────────────────
// Playback
let _playTimer = null, _isPlaying = false;

function _setPlaying(on) {
  _isPlaying = on;
  btnPlay.textContent = on ? '⏸' : '▶';
  btnPlay.classList.toggle('playing', on);
}

function _stepTo(idx) {
  S.timeIdx = Math.max(0, Math.min(D.timestamps.length - 1, idx));
  scrubber.value = S.timeIdx;
  renderAll();
}

function _play() {
  if (_isPlaying || !D.timestamps.length) return;
  _setPlaying(true);
  _playTimer = setInterval(() => {
    if (S.timeIdx < D.timestamps.length - 1) { _stepTo(S.timeIdx + 1); }
    else { _pause(); }
  }, 150);
}

function _pause() {
  _setPlaying(false);
  clearInterval(_playTimer);
  _playTimer = null;
}

btnFirst.addEventListener('click', () => { _pause(); _stepTo(0); });
btnLast.addEventListener('click',  () => { _pause(); _stepTo(D.timestamps.length - 1); });
btnPlay.addEventListener('click',  () => _isPlaying ? _pause() : _play());

btnPrev.addEventListener('click', () => { _pause(); _stepTo(S.timeIdx - 1); });
btnNext.addEventListener('click', () => { _pause(); _stepTo(S.timeIdx + 1); });

scrubber.addEventListener('input', () => {
  _pause();
  const { t0, t1 } = zoomedTRange();
  S.timeIdx = Math.max(t0, Math.min(t1, +scrubber.value));
  scrubber.value = S.timeIdx;
  renderAll();
});

// Hold-to-repeat on prev/next
let _holdTimer = null;
function _startHold(dir) { _holdTimer = setInterval(() => _stepTo(S.timeIdx + dir), 150); }
function _stopHold()     { clearInterval(_holdTimer); _holdTimer = null; }
btnPrev.addEventListener('mousedown', () => _startHold(-1));
btnNext.addEventListener('mousedown', () => _startHold( 1));
['mouseup', 'mouseleave'].forEach(ev => {
  btnPrev.addEventListener(ev, _stopHold);
  btnNext.addEventListener(ev, _stopHold);
});

dateInput.addEventListener('change', () => {
  const d = dateInput.value.replace(/-/g, '');
  if (d.length === 8) loadData(d);
});

togR2.addEventListener('change', e => {
  S.r2Filter = e.target.checked;
  r2ThreshRow.style.display = e.target.checked ? 'block' : 'none';
  rebuildOffscreens();
  renderAll();
});

r2ThreshInp.addEventListener('change', e => {
  S.r2Thresh = parseFloat(e.target.value) ?? 0.30;
  if (S.r2Filter) { rebuildOffscreens(); renderAll(); }
});

// ── TH canvas drag-to-zoom ────────────────────────────────────────────────────
function thCoordsFromClient(canvas, clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  const pW   = rect.width  - TH_M.left - TH_M.right;
  const pH   = rect.height - TH_M.top  - TH_M.bottom;
  const x    = clientX - rect.left - TH_M.left;
  const y    = clientY - rect.top  - TH_M.top;
  const { t0, t1 } = zoomedTRange();
  const { h0, h1 } = zoomedHRange();
  const nTZ = t1 - t0 + 1;
  const nHZ = h1 - h0 + 1;
  const tIdx = t0 + Math.max(0, Math.min(nTZ - 1, Math.floor(x / pW * nTZ)));
  const hIdx = h0 + Math.max(0, Math.min(nHZ - 1, nHZ - 1 - Math.floor(y / pH * nHZ)));
  return { tIdx, hIdx, inPlot: x >= 0 && y >= 0 && x <= pW && y <= pH };
}

function thDragStart(canvas, e) {
  if (e.button !== 0) return;
  S.drag.active  = true;
  S.drag.canvas  = canvas;
  S.drag.startX  = e.clientX;
  S.drag.startY  = e.clientY;
  S.drag.endX    = e.clientX;
  S.drag.endY    = e.clientY;
}

function thDragMove(canvas, e) {
  if (!S.drag.active) {
    handleTHMove(canvas === wspdCvs ? 'wspd' : 'wdir', canvas, e);
    return;
  }
  S.drag.endX = e.clientX;
  S.drag.endY = e.clientY;
  // Mirror drag rect to the other canvas
  S.drag.canvas = canvas;
  drawTH(wspdCvs, wspdOff);
  drawTH(wdirCvs, wdirOff);
}

function thDragEnd(canvas, e) {
  if (!S.drag.active) return;
  S.drag.active = false;

  const rect = canvas.getBoundingClientRect();
  const pW   = rect.width  - TH_M.left - TH_M.right;
  const pH   = rect.height - TH_M.top  - TH_M.bottom;

  const sx = S.drag.startX - rect.left - TH_M.left;
  const ex = S.drag.endX   - rect.left - TH_M.left;
  const sy = S.drag.startY - rect.top  - TH_M.top;
  const ey = S.drag.endY   - rect.top  - TH_M.top;

  const dragW = Math.abs(ex - sx);
  const dragH = Math.abs(ey - sy);
  if (dragW < 5 && dragH < 5) { renderAll(); return; }  // treat as click, no zoom

  const { t0, t1 } = zoomedTRange();
  const { h0, h1 } = zoomedHRange();
  const nTZ = t1 - t0 + 1;
  const nHZ = h1 - h0 + 1;

  const tA = t0 + Math.max(0, Math.min(nTZ - 1, Math.floor(Math.min(sx, ex) / pW * nTZ)));
  const tB = t0 + Math.max(0, Math.min(nTZ - 1, Math.floor(Math.max(sx, ex) / pW * nTZ)));
  const hA = h0 + Math.max(0, Math.min(nHZ - 1, nHZ - 1 - Math.floor(Math.max(sy, ey) / pH * nHZ)));
  const hB = h0 + Math.max(0, Math.min(nHZ - 1, nHZ - 1 - Math.floor(Math.min(sy, ey) / pH * nHZ)));

  if (tA === tB || hA === hB) { renderAll(); return; }
  applyZoom(tA, tB, hA, hB);
  rebuildOffscreens();
  renderAll();
}

[wspdCvs, wdirCvs].forEach(cvs => {
  cvs.addEventListener('mousedown',  e => thDragStart(cvs, e));
  cvs.addEventListener('mousemove',  e => thDragMove(cvs, e));
  cvs.addEventListener('mouseup',    e => thDragEnd(cvs, e));
  cvs.addEventListener('mouseleave', e => { if (S.drag.active) thDragEnd(cvs, e); else clearCursor(); });
  cvs.addEventListener('dblclick',   () => resetZoom());
});

// Cursor readout on time-height canvases (handled inside thDragMove above)
wspdCvs.addEventListener('mousemove', e => handleTHMove('wspd', wspdCvs, e));
wdirCvs.addEventListener('mousemove', e => handleTHMove('wdir', wdirCvs, e));

// Cursor readout on hodograph
hodoCvs.addEventListener('mousemove', handleHodoMove);
hodoCvs.addEventListener('mouseleave', clearCursor);

// ── Cursor readout ────────────────────────────────────────────────────────────
const curTime   = document.getElementById('cur-time');
const curHeight = document.getElementById('cur-height');
const curValue  = document.getElementById('cur-value');
const curWspd   = document.getElementById('cur-wspd');
const curWdir   = document.getElementById('cur-wdir');
const curWspdItem = document.getElementById('cur-wspd-item');
const curWdirItem = document.getElementById('cur-wdir-item');

function clearCursor() {
  curTime.textContent = curHeight.textContent = curValue.textContent = '--';
  curWspdItem.style.display = curWdirItem.style.display = 'none';
}

// Map a mouse position on a time-height canvas to (timeIdx, heightIdx)
function thCoordsFromEvent(canvas, e) {
  const rect = canvas.getBoundingClientRect();
  const pW   = rect.width  - TH_M.left - TH_M.right;
  const pH   = rect.height - TH_M.top  - TH_M.bottom;
  const x    = e.clientX - rect.left - TH_M.left;
  const y    = e.clientY - rect.top  - TH_M.top;
  if (x < 0 || y < 0 || x > pW || y > pH) return null;
  const { t0, t1 } = zoomedTRange();
  const { h0, h1 } = zoomedHRange();
  const nTZ = t1 - t0 + 1;
  const nHZ = h1 - h0 + 1;
  const tIdx = t0 + Math.max(0, Math.min(nTZ - 1, Math.floor(x / pW * nTZ)));
  const hIdx = h0 + Math.max(0, Math.min(nHZ - 1, nHZ - 1 - Math.floor(y / pH * nHZ)));
  return { tIdx, hIdx };
}

function handleTHMove(field, canvas, e) {
  const coords = thCoordsFromEvent(canvas, e);
  if (!coords) { clearCursor(); return; }
  const { tIdx, hIdx } = coords;

  const ts  = D.timestamps[tIdx];
  const hkm = D.height_km[hIdx];
  const src = field === 'wspd' ? D.wspd : D.wdir;
  const raw = src?.[tIdx]?.[hIdx];
  const masked = S.r2Filter && (D.r_sq?.[tIdx]?.[hIdx] ?? 1) < S.r2Thresh ? null : raw;

  curTime.textContent   = ts !== undefined ? fmtUTC(ts) : '--';
  curHeight.textContent = hkm !== undefined ? `${hkm.toFixed(2)} km` : '--';
  curValue.textContent  = masked !== null && masked !== undefined
    ? (field === 'wspd' ? `${masked.toFixed(1)} m/s` : `${masked.toFixed(0)}°`)  : '--';
  curWspdItem.style.display = curWdirItem.style.display = 'none';
}

function handleHodoMove(e) {
  if (!D.timestamps.length) { clearCursor(); return; }
  const wrap   = document.getElementById('hodo-wrap');
  const rect   = wrap.getBoundingClientRect();
  const side   = Math.min(rect.width, rect.height);
  const margin = 38;
  const cx     = rect.left + rect.width  / 2;
  const cy     = rect.top  + rect.height / 2;
  const radius = side / 2 - margin;
  const scale  = radius / MAX_SPEED_RING;

  // Canvas-space offset from centre
  const dx = e.clientX - cx;
  const dy = e.clientY - cy;
  if (Math.sqrt(dx*dx + dy*dy) > radius + 10) { clearCursor(); return; }

  const wspd = D.wspd[S.timeIdx];
  const wdir = D.wdir[S.timeIdx];
  if (!wspd || !wdir) { clearCursor(); return; }

  // Find the plotted point closest to the cursor
  let bestDist = Infinity, bestH = -1;
  for (let h = 0; h < S.hClip; h++) {
    const sp = wspd[h], wd = wdir[h], rq = D.r_sq?.[S.timeIdx]?.[h];
    if (sp === null || wd === null || sp === undefined || wd === undefined) continue;
    if (S.r2Filter && rq !== null && rq !== undefined && rq < S.r2Thresh) continue;
    const rad = wd * Math.PI / 180;
    const px  = -sp * Math.sin(rad) * scale;  // same sign convention as drawHodograph
    const py  =  sp * Math.cos(rad) * scale;
    const d   = Math.hypot(dx - px, dy - py);
    if (d < bestDist) { bestDist = d; bestH = h; }
  }

  if (bestH < 0 || bestDist > 30) { clearCursor(); return; }

  const ts  = D.timestamps[S.timeIdx];
  const hkm = D.height_km[bestH];
  curTime.textContent   = ts !== undefined ? fmtUTC(ts) : '--';
  curHeight.textContent = hkm !== undefined ? `${hkm.toFixed(2)} km` : '--';
  curValue.textContent  = '--';
  curWspd.textContent   = `${wspd[bestH].toFixed(1)} m/s`;
  curWdir.textContent   = `${wdir[bestH].toFixed(0)}°`;
  curWspdItem.style.display = curWdirItem.style.display = '';
}

const ro = new ResizeObserver(() => {
  redrawColorbars();
  if (D.timestamps.length) renderAll();
});
ro.observe(document.getElementById('hodo-card'));
ro.observe(document.getElementById('wspd-card'));
ro.observe(document.getElementById('wdir-card'));

// ── Init ──────────────────────────────────────────────────────────────────────
(function init() {
  // Colorbars need layout to be done first
  requestAnimationFrame(redrawColorbars);

  // Determine initial date: URL ?date= param > TEST_VAD_DATE > today
  const _urlDate = new URLSearchParams(window.location.search).get('date');
  let initDate;
  if (_urlDate || TEST_VAD_DATE) {
    initDate = _urlDate || TEST_VAD_DATE;
    const y = initDate.slice(0, 4), mo = initDate.slice(4, 6), dd = initDate.slice(6, 8);
    dateInput.value = `${y}-${mo}-${dd}`;
  } else {
    const today = new Date();
    initDate = today.toISOString().slice(0, 10).replace(/-/g, '');
    dateInput.value = today.toISOString().slice(0, 10);
  }

  loadData(initDate);
})();
</script>
